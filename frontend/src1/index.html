<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Go Surf</title>
    <link rel="stylesheet" href="stylesheet.css" />
</head>

<body id="body">
    <div class="container">

        <!-- NAVBAR -->
        <header class="navbar">
            <div class="logo">
                <h1>Go Surf</h1>
            </div>
            <div id="loginbutton">
                <button id="login">Log In</button>
            </div>
        </header>

        <!-- HERO -->
        <section class="hero">

            <!-- Left sidebar -->
            <div class="sidebar">
                <ul>
                    <li>Newport Beach, CA</li>
                    <li>Huntington Beach, CA</li>
                    <li>Laguna Beach, CA</li>
                </ul>
            </div>
            <!-- Right side -->
            <div class="maincontent">
                <div class="tabs">
                    <button class="tab-active" onclick="showSpot('spot1')">spot 1</button>
                    <button class="tab" onclick="showSpot('spot2')">spot 2</button>
                    <button class="tab" onclick="showSpot('spot3')">spot 3</button>
                    <button class="tab" onclick="showSpot('spot4')">spot 4</button>
                    <button class="tab" onclick="showSpot('spot5')">spot 5</button>
                </div>

                <!-- tab content -->
                <div class="content">
                    <p>content goes here </p>
                </div>
            </div>
        </section>

        <!-- FOOTER -->
        <footer id="footer">
            <p>© 2026 Go Surf</p>
        </footer>

        <script src="script.js"></script>
    </div>
</body>

</html>
