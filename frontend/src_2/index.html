<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <!-- Header and navbar -->
    <div class="header">
        <div class="spacer-left"></div>

        <div class="nav-center">
            <button class="navbutton">Home</button>
            <button class="navbutton">Forecasts</button>
            <button class="navbutton">About</button>
        </div>

        <div class="nav-right">
            <button class="navbutton user-icon">
                <img src="icons/user-logo.svg" alt="user icon" width="20" height="20">
            </button>
        </div>
    </div>

    <!-- main container -->
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Location</div>
                <div class="location-search">
                    <input type="text" placeholder="Search..." />
                </div>
            </div>
        </div>

        <!-- main container -->
        <div class="content"></div>
    </div>


</body>

</html>
