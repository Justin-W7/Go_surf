<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Go Surf</title>
</head>

<body>
    <!-- Header and navbar -->
    <div class="rail">
        <div class="nav-top">

            <button class="navbutton home-icon">
                <img class="icon-default" src="icons/home-button.svg" alt="home icon" width="20" height="20">
            </button>
            <button class="navbutton forecast-icon">
                <img>
            </button>
            <button class="navbutton about-icon">
                <img>
            </button>
        </div>
        <div class="nav-bottom">
            <button class="navbutton user-icon">
                <img class="icon-default" src="icons/user-logo.svg" alt="user icon" width="20" height="20">
            </button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Location</div>
            <div class="location-searchbox">
                <input type="text" placeholder="Search..." />
            </div>
        </div>
        <div class="sidebar-content">
        </div>
    </div>

    <div class="content">
        <div class="content-header">
            <div class="location-surf-spots">
                <ul class="surf-spot-list"></ul>
            </div>
        </div>
        <div class="content-main">
            <div class="logodiv">
                <div class="logotext">Go Surf</div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
